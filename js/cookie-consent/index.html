<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Consent</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="Demo website">
      <header class="site-header">
        <div class="brand">
          <span class="logo" aria-hidden="true"></span>
          <span>xxxxxx</span>
        </div>

        <nav class="nav-links" aria-label="Demo navigation">
          <a href="#">xxx</a>
          <a href="#">xxx</a>
          <a href="#">xxx</a>
        </nav>
      </header>

      <section class="hero-block" aria-label="Featured content"></section>
      <section class="line-block" aria-label="Summary content"></section>

      <section class="content-grid" aria-label="Article previews">
        <article class="text-column">
          <h1>xx xxxxx x</h1>
          <p>xxxxx xxx xx xxx</p>
          <p>xxx xx xxxxx xx x</p>
          <p>xxx x xxx xxx x x</p>

          <div class="preview-cards">
            <span></span>
            <span></span>
          </div>
        </article>

        <article class="text-column">
          <h2>xxxxxx</h2>
          <p>xxxxxx xxx xx xxx</p>
          <p>xxx xx xxxxx xx x</p>
          <p>xxx x xxx xxx x x</p>
        </article>
      </section>
    </main>

    <section
      class="cookie-consent"
      id="cookieConsent"
      aria-labelledby="cookieTitle"
      aria-live="polite"
    >
      <button
        class="close-button"
        type="button"
        aria-label="Close cookie consent popup"
      >
        <span aria-hidden="true"></span>
      </button>

      <div class="cookie-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <h2 id="cookieTitle">
        We use cookies to improve your user experience.
      </h2>

      <button class="accept-button" type="button">I like Cookies</button>
    </section>

    <script src="index.js"></script>
  </body>
</html>
