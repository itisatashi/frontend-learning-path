<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datepicker UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="datepicker">
        <section class="date-field" aria-label="Choose a date">
          <input class="date-input" type="text" placeholder="dd / mm / yyyy" />
          <button class="date-button" type="button" aria-label="Open calendar">
            <span class="calendar-icon" aria-hidden="true"></span>
          </button>
        </section>

        <section class="calendar-panel" aria-label="December 2022 calendar">
          <div class="calendar-header">
            <button class="month-button previous" type="button" aria-label="Previous month"></button>
            <h1>December 2022</h1>
            <button class="month-button next" type="button" aria-label="Next month"></button>
          </div>

          <div class="weekdays" aria-hidden="true">
            <span>S</span>
            <span>M</span>
            <span>T</span>
            <span>W</span>
            <span>T</span>
            <span>F</span>
            <span>S</span>
          </div>

          <div class="date-grid">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <time datetime="2022-12-01">1</time>
            <time datetime="2022-12-02">2</time>
            <time datetime="2022-12-03">3</time>
            <time datetime="2022-12-04">4</time>
            <time datetime="2022-12-05">5</time>
            <time datetime="2022-12-06">6</time>
            <time datetime="2022-12-07">7</time>
            <time datetime="2022-12-08">8</time>
            <time datetime="2022-12-09">9</time>
            <time datetime="2022-12-10">10</time>
            <time datetime="2022-12-11">11</time>
            <time datetime="2022-12-12">12</time>
            <time datetime="2022-12-13">13</time>
            <time datetime="2022-12-14">14</time>
            <time datetime="2022-12-15">15</time>
            <time datetime="2022-12-16">16</time>
            <time datetime="2022-12-17">17</time>
            <time datetime="2022-12-18">18</time>
            <time datetime="2022-12-19">19</time>
            <time datetime="2022-12-20">20</time>
            <time datetime="2022-12-21">21</time>
            <time datetime="2022-12-22">22</time>
            <time datetime="2022-12-23">23</time>
            <time datetime="2022-12-24">24</time>
            <time datetime="2022-12-25">25</time>
            <time datetime="2022-12-26">26</time>
            <time datetime="2022-12-27">27</time>
            <time datetime="2022-12-28">28</time>
            <time datetime="2022-12-29">29</time>
            <time datetime="2022-12-30">30</time>
            <time datetime="2022-12-31">31</time>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
