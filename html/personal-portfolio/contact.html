<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact page with a form to get in touch." />
    <meta name="author" content="Tolegenov Atabek" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Contact - Tolegenov Atabek</title>
  </head>
  <body>
    <header>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="home.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Atashi</span>
        </a>
        <ul class="nav-links">
          <li><a href="home.html">Home</a></li>
          <li><a href="project.html">Projects</a></li>
          <li><a href="articles.html">Articles</a></li>
          <li><a aria-current="page" href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <section class="hero compact-hero">
        <h1>Contact</h1>
        <p>Send a message about a project, collaboration, or frontend idea.</p>
      </section>
    </header>
    <main class="page-content">
      <section class="contact-panel">
        <h2>Get in Touch</h2>
        <form action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>
    <footer class="site-footer">
      <p>&copy; all rights reserved 2025</p>
    </footer>
  </body>
</html>
