<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="gallery">
      <img
        class="tall"
        src="images/1.jpg"
        alt="Foggy beach with a large rock formation"
      />
      <img src="images/2.jpg" alt="White futuristic living room" />
      <img src="images/3.jpg" alt="Table with plates and bowls of food" />
      <img
        class="tall"
        src="images/4.jpg"
        alt="Building entrance with a red door"
      />
      <img
        class="tall"
        src="images/5.jpg"
        alt="White apartment buildings beside a street"
      />
      <img src="images/6.jpg" alt="Beach viewed from a grassy hill" />
    </main>
  </body>
</html>
